# 前端显示语言：zh（中文）/ en（英文），与 Web 界面语言切换同步
preferred_language: zh

# auto-recap：用户空闲5分钟后自动生成会话摘要（TUI 端）
auto_recap:
  enabled: true

a2ui:
  enabled: false
  protocol_version: "0.8"
  stream_validation_enabled: true
  non_web_fallback_enabled: false
  dev_smoke_tools_enabled: false

symphony:
  enabled: false
  paths:
    skills_root: ""
    score_dir: ""

  fingerprint:
    scan:
      max_depth:
    extraction:
      workers: 4
      batch_size: 2
      body_limit:
    normalization:
      workers: 4
      batch_size: 2
      duplicate_name_similarity_threshold: 0.8
      max_vocab_size:

  build:
    workers: 4
    batch_size: 16
    require_consensus: false
    min_edge_confidence: 0.1

  orchestration:
    mode: fast
    top_k: 3
    max_depth: 4
    min_edge_confidence: 0.3

  skill_retrieval:
    enabled: false
    artifact_root: ${SYMPHONY_SKILL_RETRIEVAL_ROOT:-}
    build:
      branching_factor: 12
      max_depth: 6
      root_categories: ""
      max_workers: 2
      max_retries: 2
      request_timeout_seconds: 420
      classification_batch_limit: 32
      discovery_seed: 42
      postprocess_enabled: true
      postprocess_max_passes: 1
      postprocess_min_skills: 6
      equivalence_enabled: false
    retrieve:
      compact_codes_enabled: false
      flatten_tree: false
      max_exposure_depth: 1

# Auto Memory：对话结束后自动提取记忆，按项目隔离存储
# 存储路径：~/.jiuwenswarm/projects/{sanitized-project-path}/memory/
# 类似 Claude Code 的 auto-memory 功能
auto_memory_enabled: false

# 日志目录：~/.jiuwenswarm/agent/.logs/
# gateway.log / channel.log / agent_server.log 按源码路径分流；full.log 为汇总。
# level：未单独指定时的默认级别。console_level：控制台；可省略则用 level。
# 环境变量 LOG_LEVEL 仅覆盖控制台级别（不覆盖各日志文件）。
logging:
  level: INFO
  console_level: INFO
  gateway: INFO
  channel: INFO
  agent_server: INFO
  full: INFO

memory:
  # ============================================================
  # 记忆系统配置
  # ============================================================
  # 两个正交开关：
  #   1) engine — 挂载哪套 rail（内置 / 外接 / 都挂 / 都不挂）
  #   2) mode   — 内置记忆的存储位置（local | cloud），不影响外接
  #
  # 外接 rail 的启用 = (engine ∈ {external, both}) AND (external.provider 非空)
  # 内置 rail 的启用 = (engine ∈ {builtin, both})  AND (mode=local)
  #                    AND modes.agent.<当前 mode>.memory.enabled=true
  # ============================================================

  mode: ${MEMORY_MODE:-local}            # 内置记忆存储位置：local | cloud
  # 记忆引擎总开关：builtin | external | both | none
  #   builtin  — 仅内置记忆（默认，兼容旧配置）
  #   external — 仅外接记忆（LTM / Mem0 / OpenViking / 插件）
  #   both     — 内置 + 外接并存
  #   none     — 全部关闭
  engine: ${MEMORY_ENGINE:-builtin}
  forbidden_memory_definition:
    enabled: false
    patterns: []
    description:
      zh: "以下内容禁止记忆：密码、API密钥、Secret、Token、信用卡号、身份证号、手机号等敏感信息"
      en: "The following content is forbidden to remember: passwords, API keys, secrets, tokens, credit card numbers, ID numbers, phone numbers and other sensitive information"

  # ------------------------------------------------------------
  # 外接记忆（External Memory）
  # ------------------------------------------------------------
  # 启用方式（任选一种）：
  #
  # 【方案 1：YAML 直接改】
  #   memory.engine: external   # 或 both
  #   memory.external.provider: mem0   # 选一个：openjiuwen | mem0 | openviking
  #   # 然后在下方对应的 mem0/openjiuwen/openviking 子段填 api_key 或 endpoint
  #
  # 【方案 2：环境变量覆盖】
  #   export MEMORY_ENGINE=external
  #   export MEMORY_EXTERNAL_PROVIDER=mem0
  #   export MEM0_API_KEY=sk-xxx
  #
  # 【关闭外接记忆】
  #   把 memory.engine 改回 builtin 或 none；
  #   或把 memory.external.provider 留空（两者任一生效即可禁用）
  #
  # 【挂载模式常见组合】
  #   ┌─────────────┬───────────────┬──────────────────────────────────────┐
  #   │ engine      │ provider      │ 效果                                 │
  #   ├─────────────┼───────────────┼──────────────────────────────────────┤
  #   │ builtin     │ *             │ 只挂内置（默认；外接即使填了也不挂） │
  #   │ external    │ openjiuwen    │ 只挂外接 LTM                         │
  #   │ external    │ mem0          │ 只挂外接 Mem0                        │
  #   │ external    │ openviking    │ 只挂外接 OpenViking                  │
  #   │ external    │ <plugin-name> │ 只挂用户安装的插件                   │
  #   │ both        │ 任一          │ 内置 + 外接同时挂（LLM 两套工具并列）│
  #   │ none        │ *             │ 全关，任何记忆 rail 都不挂           │
  #   └─────────────┴───────────────┴──────────────────────────────────────┘
  #
  # 说明：
  # - 外接记忆 mode-independent：配置一次，plan / fast 模式全程生效，
  #   跨 config 热重载持久存活（保留 prefetch 缓存、电路断路器、会话状态）
  # - 单 provider 策略：同一时刻 provider 只能选一个
  # - 失败降级：provider 构建失败或网络异常不阻塞主流程
  external:
    # 选哪家 provider。空字符串 = 禁用外接（等价于 engine=builtin）
    provider: ${MEMORY_EXTERNAL_PROVIDER:-}   # '' | openjiuwen | mem0 | openviking | lakebase | <plugin-name>
    # 数据隔离标识（所有 provider 共用）
    user_id: ${MEMORY_USER_ID:-__default__}
    scope_id: ${MEMORY_SCOPE_ID:-__default__}

    # -- OpenJiuwen LTM（本地长期记忆：KV + 向量 + DB）--
    # 生效条件：provider='openjiuwen'
    # 依赖顶层 embed 段提供 embedding 配置（不单独配置 api_key）
    openjiuwen:
      kv_type: shelve                                    # shelve | in_memory | sqlite
      kv_path: ${MEMORY_KV_PATH:-}                       # 默认 ~/.jiuwenswarm/memory/ltm/kv
      vector_type: chroma                                # chroma
      vector_persist_dir: ${MEMORY_VECTOR_DIR:-}         # 默认 ~/.jiuwenswarm/memory/ltm/chroma
      db_type: sqlite
      db_path: ${MEMORY_DB_PATH:-}                       # 默认 ~/.jiuwenswarm/memory/ltm/ltm.db

    # -- Mem0（云端事实抽取+语义检索）--
    # 生效条件：provider='mem0'
    # 必填：api_key（从 mem0.ai 获取）
    mem0:
      api_key: ${MEM0_API_KEY:-}
      user_id: ${MEM0_USER_ID:-jiuwenswarm-user}
      agent_id: ${MEM0_AGENT_ID:-jiuwenswarm}
      rerank: true                                       # 搜索结果重排序（更准但更慢）

    # -- OpenViking（字节上下文数据库）--
    # 生效条件：provider='openviking'
    # 必填：endpoint 可访问
    openviking:
      endpoint: ${OPENVIKING_ENDPOINT:-http://127.0.0.1:1933}
      api_key: ${OPENVIKING_API_KEY:-}
      account: ${OPENVIKING_ACCOUNT:-root}
      user: ${OPENVIKING_USER:-default}

    lakebase:
      api_key: ${LAKEBASE_API_KEY:-}
      base_url: ${LAKEBASE_API_URL:-}
      base_id: ${LAKEBASE_MEM_BASE_ID:-}
      database_id: ${LAKEBASE_DATABASE_ID:-}

models:
  defaults:
    - model_client_config:
        api_base: ${API_BASE}
        api_key: ${API_KEY}
        model_name: ${MODEL_NAME:-xiaomi/mimo-v2-omni}
        client_provider: ${MODEL_PROVIDER}
        timeout: 1800
        verify_ssl: false
        custom_headers: {}
      model_config_obj:
        temperature: 0.95
      is_default: true
  video:
      model_client_config:
        api_base: ${VIDEO_API_BASE}
        api_key: ${VIDEO_API_KEY}
        model_name: ${VIDEO_MODEL_NAME:-xiaomi/mimo-v2-omni}
        client_provider: ${VIDEO_PROVIDER}
        timeout: 1800
        verify_ssl: false
      model_config_obj:
        temperature: 0.95
  audio:
      model_client_config:
        api_base: ${AUDIO_API_BASE}
        api_key: ${AUDIO_API_KEY}
        model_name: ${AUDIO_MODEL_NAME:-openai/gpt-4o-audio-preview}
        client_provider: ${AUDIO_PROVIDER}
        verify_ssl: false
        timeout: 1800
      model_config_obj:
        temperature: 0.95
  vision:
      model_client_config:
        api_base: ${VISION_API_BASE}
        api_key: ${VISION_API_KEY}
        model_name: ${VISION_MODEL_NAME:-bytedance-seed/seed-2.0-mini}
        client_provider: ${VISION_PROVIDER}
        verify_ssl: false
        timeout: 1800
      model_config_obj:
        temperature: 0.95
  image_gen:
      model_client_config:
        api_base: ${IMAGE_GEN_API_BASE:-https://dashscope.aliyuncs.com/api/v1}
        api_key: ${IMAGE_GEN_API_KEY}
        model_name: ${IMAGE_GEN_MODEL_NAME:-qwen-image-max}
        client_provider: ${IMAGE_GEN_PROVIDER:-DashScope}
        verify_ssl: false
        timeout: 1800
      model_config_obj:
        temperature: 0.95

# 外接 ACP Agent（stdio），供工具 acp_chat 使用。按需取消注释并填写；command/args 可指向任意兼容 ACP 的包（与 VS Code formulahendry.acp-client 预置列表一致）。
acp_agents:
   codex:
     command: npx
     args: ["@zed-industries/codex-acp@latest"]
     cwd:
     env:
       OPENAI_API_KEY: ${OPENAI_API_KEY}   # 仅由此 env 注入子进程（不读 workspace .env / 父进程）

# ============================================================
# Agent 配置（可被 team.agents / modes.team.<name>.agents 引用）
# ============================================================
# 每个 agent 定义一个可复用的 agent 配置模板，支持以下字段（均可选）：
#
#   model:                  # 不配则继承 models.default
#     model_client_config:
#       client_provider: OpenAI
#       api_base: https://api.deepseek.com
#       api_key: sk-xxx
#       timeout: 1800
#       verify_ssl: false
#       custom_headers: {}
#     model_request_config:
#       model: deepseek-chat
#   skills:                 # 不配则不自动填充
#     - skill_a
#     - skill_b
#   workspace:              # 默认 {"stable_base": true}
#     stable_base: true
#   max_iterations: 200     # 默认 200
#   completion_timeout: 600.0  # 默认 600.0
#
# 示例：给不同 agent 配置不同模型和技能
#   agent_coder:
#     model:
#       model_client_config:
#         client_provider: OpenAI
#         api_base: https://api.deepseek.com
#         api_key: sk-xxx
#       model_request_config:
#         model: deepseek-chat
#     skills:
#       - code_review
#       - unit_test
#     max_iterations: 300
#
agents:
  agent_leader:
    workspace:
      stable_base: true
    max_iterations: 200
    completion_timeout: 600.0

  agent_teammate:
    workspace:
      stable_base: true
    max_iterations: 200
    completion_timeout: 600.0

telemetry:
  enabled: false                    # 总开关（环境变量 OTEL_ENABLED 优先）
  exporter: otlp                    # otlp / console / none
  endpoint: http://localhost:4317   # OTLP endpoint
  protocol: grpc                    # grpc / http
  headers: {}                       # 公共 OTLP headers，可被 traces/metrics 覆盖
  log_messages: true                # 是否在 span event 中记录完整消息内容
  service_name: jiuwenswarm
  provider_factory:                 # 自定义 provider factory，格式：module:function
  traces:
    exporter:                       # trace exporter，默认回退到 telemetry.exporter
    endpoint:                       # trace endpoint，默认回退到 telemetry.endpoint
    protocol:                       # trace protocol，默认回退到 telemetry.protocol
    headers: {}                     # trace headers，默认回退到 telemetry.headers
  metrics:
    exporter:                       # metrics exporter，默认回退到 telemetry.exporter
    endpoint:                       # metrics endpoint，默认回退到 telemetry.endpoint
    protocol:                       # metrics protocol，默认回退到 telemetry.protocol
    headers: {}                     # metrics headers，默认回退到 telemetry.headers

# ============================================================
# Team 可观测性配置（OTel + Langfuse）
# ============================================================
# 与 telemetry 不同，team_observability 专门用于 TeamAgent 的
# 可观测性追踪，包括 team/member/task/message 级别的 span。
# 启用后会自动将 OtelTeamMonitorHandler 注册到 TeamAgent，
# 将事件转为 OTel span 导出到 Langfuse / OTLP Collector。
#
# 前置条件：
#   1. 启动 OTel Collector + Langfuse
#   2. 在用户配置中设置 team_observability.enabled: true
# ============================================================
team_observability:
  enabled: false                    # Team observability 总开关
  exporter: file                    # otlp_grpc / otlp_http / file
  endpoint: http://localhost:4317   # OTLP gRPC endpoint（file 模式不需要）
  service_name: jiuwenswarm         # 服务名称（OTel resource service.name）
  sample_rate: 1.0                  # 采样率 (0.0-1.0)
  redact_prompts: false             # 是否脱敏 prompt 内容
  redact_completions: false         # 是否脱敏 completion 内容
  attribute_value_max_length: 10240 # OTel attribute value 最大长度
  langfuse_public_key: ""           # Langfuse OTLP 认证 public key（可选）
  langfuse_secret_key: ""           # Langfuse OTLP 认证 secret key（可选）
  traces_dir: ""                    # file exporter 输出目录，默认 ~/.jiuwenswarm/.trace
  file_retention_days: 7            # file exporter 文件保留天数

react:
  agent_name: main_agent
  enable_task_loop: false
  max_iterations: 100
  model_name: ${MODEL_NAME:-deepseek-chat}
  skill_mode: all
  # code_agent / research_agent 默认不启用；只有显式配置 enabled: true 才会显示并可被 task_tool 调用
  # browser_agent: code.team 路径通过此 key 门控（单 agent 路径仍由 browser runtime 开关决定）
  subagents:
    general_agent:
      enabled: true
    code_agent:
      enabled: false
      # max_iterations: 15
    research_agent:
      enabled: false
      # max_iterations: 15
    browser_agent:
      enabled: true
      # max_iterations: 15
  answer_chunk_size: 500
  stream_chunk_threshold: 50
  stream_character_threshold: 2000
  context_engine_config:
    enable_kv_cache_release: false
    enable_openrouter_model_context_window_tokens: true
    enable_reload: true
    enabled: true
    message_summary_offloader_config:
      messages_threshold: null
      large_message_threshold: 15000
      offload_message_type: [ "tool" ]
      protected_tool_names: ["read_file"]
      messages_to_keep: null
      keep_last_round: false
      customized_summary_prompt: null
      enable_adaptive_compression: true
      summary_max_tokens: 900
      enable_precise_step: false
      step_summary_max_context_messages: 8
      content_max_chars_for_compression: 200000
    dialogue_compressor_config:
      messages_threshold: null
      tokens_threshold: 100000
      messages_to_keep: 10
      keep_last_round: false
      compression_target_tokens: 1800
      offload_writeback_enabled: false
    current_round_compressor_config:
      tokens_threshold: 100000
      messages_to_keep: 3
      min_selected_tokens_for_compression: 20000
      compression_target_tokens: 4000
      summary_merge_target_tokens: 4000
      accumulated_summary_token_limit: 20000
      summary_merge_min_blocks: 3
      prior_context_window_size: 10
      offload_writeback_enabled: false
    round_level_compressor_config:
      rounds_threshold: 2
      trigger_context_ratio: 0.9
      target_total_tokens: 160000
      compression_call_max_tokens: 250000
      keep_last_round: true
      keep_recent_messages: 6
      messages_to_keep: 6
      first_pass_target_tokens: 30000
      second_pass_target_tokens: 20000
      third_pass_target_tokens: 10000
      truncate_head_ratio: 0.2
      offload_writeback_enabled: false
  # Skills 在线自演进配置
  evolution:
    enabled: true             # true = 启用在线 Skills 自演进
    auto_scan: false           # true = 每轮对话后自动扫描（建议先用手动 /evolve）
    auto_save: false           # true = 自演进审批无需用户点击自动通过（内部开关）
    skill_create: false        # true = 注册 SkillCreateRail（单 agent）及 TeamSkillCreateRail（leader）
    skill_base_dir: "agent/skills"  # Skill 根目录
  a2x_registry:
    base_url: "http://127.0.0.1:8000"
    timeout: 30.0
    api_key: ""
    # null uses the SDK default ownership store under the process HOME.
    # Keep ownership persistent so teardown can call replace_agent_card safely.
    ownership_file:
    # Allowed values: teammate / teamleader
    role: "teammate"
    # When role=teammate, automatic blank-agent registration during agent
    # initialization calls AsyncA2XRegistryClient.register_blank_agent(...).
    # endpoint may be omitted in distributed mode; it defaults to
    # team.transport.params.bootstrap_direct_addr when available.
    dataset: "team_pool"
    endpoint: ""

tools:
  - todo
  - skill

email_settings:
  email_address: ${EMAIL_ADDRESS}
  token: ${EMAIL_TOKEN}
  smtp_server: ${SMTP_SERVER:-smtp.gmail.com}
  port: ${EMAIL_PORT:-587}

embed:
  embed_api_key: ${EMBED_API_KEY}
  embed_base_url: ${EMBED_API_BASE}
  embed_model: ${EMBED_MODEL}

task_memory:
  # Set enabled: true to activate TaskMemoryService skill tools
  # (experience_retrieve, experience_learn, experience_clear)
  enabled: true
  # Override defaults below if task memory uses a different model/key than the main agent
  llm_model: ${TASK_MEMORY_LLM_MODEL}
  embedding_model: ${TASK_MEMORY_EMBED_MODEL}
  api_key: ${TASK_MEMORY_API_KEY}
  api_base: ${TASK_MEMORY_API_BASE}
  # Retrieval and summary algorithms: ACE | ReasoningBank | ReMe
  retrieval_algo: ACE
  summary_algo: ACE

gateway:
  # SessionMap 仅用于企业claw场景，如 feishu_enterprise 等通道：将平台身份映射为 Agent 的 session_id。
  # 取值：per_chat_bot（默认，同 chat+bot 共享会话）, per_chat_bot_user（按 user 分会话）
  session_map_scope: per_chat_bot

  # AgentClient 配置 - Gateway 连接到 AgentServer 的方式
  # type: websocket（默认，WebSocket 连接） | yuanrong（openYuanRong 函数调用）
  agent_client:
    type: websocket # websocket | yuanrong
    # yuanrong 函数模式配置下面参数
    frontend_endpoint:
    function_version_urn:
    concurrency: 1
    invoke_timeout_s: 60

heartbeat:
  # 心跳间隔（秒），默认 3600
  every: 3600
  # 心跳结果回传的 channel（如 "web"），
  target: web
  # 心跳生效时间段（本地时间），start <= now < end 时心跳生效
  active_hours:
    start: 08:00
    end: 22:00

# 执行护栏：工具循环检测与主动中断
execution_guard:
  # 断路器：检测工具重复/交替/无进展循环，critical 级会强制结束当次回答
  circuit_breaker:
    # 总开关。断路器会主动中断 agent（force-finish），默认关闭，需显式开启
    enabled: false
    # 相同工具+参数重复达到该次数时告警（仅日志，不中断）
    warning_threshold: 10
    # Ping-Pong 两工具交替且无进展达到该次数时中断
    critical_threshold: 20
    # 工具连续无进展（结果不变）达到该次数时兜底中断
    global_breaker_threshold: 30
    # 未知/错误工具连续调用达到该次数时停止重试并中断
    unknown_tool_threshold: 10

channels:
  web:
    send_file_allowed: true
  feishu:
    # 飞书应用配置
    app_id:
    app_secret:
    encrypt_key:
    verification_token:
    allow_from:
    enable_streaming: false
    enabled: false
    send_file_allowed: true
    # 群聊数字分身（默认关闭）
    group_digital_avatar: false
    my_user_id: ""
    bot_name: ""
    enable_memory: false
  feishu_enterprise:
    # 企业飞书多 Bot 配置（每个 bot 会注册为独立 channel: feishu_enterprise:<app_id>）
    # bot_a:
    #   app_id:
    #   app_secret:
    #   encrypt_key:
    #   verification_token:
    #   allow_from: []
    #   enable_streaming: true
    #   chat_id:
    #   enabled: false
  xiaoyi:
    # 华为小艺 A2A 配置
    mode: xiaoyi_channel
    ak:
    sk:
    api_id:
    push_id:
    agent_id:
    ws_url1: wss://hag.cloud.huawei.com/openclaw/v1/ws/link
    ws_url2: wss://116.63.174.231/openclaw/v1/ws/link
    enable_streaming: true
    enabled: false
    # xiaoyi_claw配置
    uid:
    api_key:
    push_url:
    file_upload_url:
    # 小艺手机端插件tools调用，会添加相关tools到系统提示词
    phone_tools_enabled: false
    send_file_allowed: true
  dingtalk:
    # 钉钉应用配置
    client_id:
    client_secret:
    allow_from: []
    enabled: false
    send_file_allowed: true
  telegram:
    # Telegram Bot 配置
    # 从 @BotFather 获取 bot_token
    bot_token:
    # 用户白名单（Telegram user_id），为空则允许所有用户
    allow_from: []
    # 消息解析模式: Markdown, HTML, None
    parse_mode: Markdown
    # 群聊模式: mention(仅响应@提及), reply(仅响应回复), all(响应所有), off(禁用群聊)
    group_chat_mode: mention
    enabled: false
  discord:
    # Discord Bot 配置（当前版本仅支持参数管理）
    # 可与用户私聊（DM）：仍受 allow_from 约束
    # Bot Token（Discord Developer Portal -> Bot）
    bot_token:
    # Application ID（Discord Developer Portal -> General Information）
    application_id:
    # 目标服务器 ID（Guild ID）
    guild_id:
    # 目标频道 ID（Channel ID）
    channel_id:
    # 用户白名单（Discord user_id），为空则允许所有用户
    allow_from: []
    # 是否关闭私信功能
    block_dm: false
    enabled: false
  whatsapp:
    # WhatsApp 配置（通过本地 Baileys bridge）
    bridge_ws_url: ws://127.0.0.1:19600/ws
    default_jid:
    allow_from: []
    enable_streaming: true
    auto_start_bridge: false
    bridge_command: node scripts/whatsapp-bridge.js
    bridge_workdir:
    enabled: false
  wechat:
    # 个人微信 iLink Bot API 配置
    enable_streaming: false
    base_url: https://ilinkai.weixin.qq.com
    bot_token:
    ilink_bot_id:
    ilink_user_id:
    allow_from: []
    auto_login: true
    qrcode_poll_interval_sec: 2.0
    long_poll_timeout_sec: 45
    backoff_base_sec: 1.0
    backoff_max_sec: 30.0
    credential_file: ~/.wx-ai-bridge/credentials.json
    enabled: false
  wecom:
    # 企业微信 AI 机器人配置
    bot_id:
    secret:
    ws_url: wss://openws.work.weixin.qq.com
    allow_from: []
    enable_streaming: true
    send_thinking_message: false
    enabled: false
    send_file_allowed: true
    # 群聊数字分身（默认关闭）
    group_digital_avatar: false
    my_user_id: ""
    bot_name: ""
    enable_memory: false

# ========== 细粒度权限管控（tiered_policy）==========
#
# schema: tiered_policy（或兼容 v_cc / v4.2）时由 tiered_policy.evaluate_tiered_policy 求值；
# permission_mode: normal|strict 决定 severity 映射，见 agentserver/permissions/tiered_policy.py。
# severity（normal）：LOW/MEDIUM→allow，HIGH/CRITICAL→ask；strict 下 MEDIUM→ask、CRITICAL→deny。
# rules[*].action: 可选显式动作 allow|ask|deny；配置后优先于 severity 映射，适合敏感文件读取、
# 系统控制等不希望随 permission_mode 漂移的规则。
# 内置参数规则 > 用户 rules；整工具存在则不用 defaults；详见 tiered_policy 模块说明。
#
# 三种动作: allow / ask / deny
permissions:
  enabled: false
  schema: tiered_policy
  permission_mode: normal

  defaults:
    "*": "allow"

  tools:
    bash: ask
    mcp_exec_command: ask
    create_terminal: ask
    write: ask
    write_file: ask
    edit_file: ask
    search_replace: ask
    # ask_user 只向用户提问，不修改系统，自动放行避免权限中断阻塞问题选项呈现
    ask_user: allow
    write_memory: allow
    edit_memory: allow
    read_memory: allow
    memory_search: allow
    memory_get: allow
    todo_create: allow
    todo_insert: allow
    todo_complete: allow
    todo_remove: allow
    todo_list: allow
    # Coding Memory 工具权限
    coding_memory_write: allow
    coding_memory_edit: allow
    coding_memory_read: allow
    # 外接记忆工具（External Memory — OpenJiuwen / Mem0 / OpenViking）
    ltm_search: allow
    ltm_search_summary: allow
    mem0_profile: allow
    mem0_search: allow
    mem0_conclude: allow
    viking_search: allow
    viking_read: allow
    viking_browse: allow
    viking_remember: allow
    viking_add_resource: allow
    mcp_free_search: allow
    mcp_paid_search: allow
    mcp_fetch_webpage: allow
    cron_list_jobs: allow
    cron_get_job: allow
    cron_create_job: allow
    cron_update_job: allow
    cron_delete_job: allow
    cron_toggle_job: allow
    cron_preview_job: allow
    acp_chat: ask

  rules:
    - id: shell_allow_dir
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "dir *"
      severity: LOW
    - id: shell_allow_ls
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "ls *"
      severity: LOW
    - id: shell_allow_pwd
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "pwd *"
      severity: LOW
    - id: shell_allow_cd
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "cd *"
      severity: LOW
    - id: shell_allow_echo
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "echo *"
      severity: LOW
    - id: shell_allow_cat
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "cat *"
      severity: LOW
    - id: shell_allow_type
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "type *"
      severity: LOW
    - id: shell_allow_head
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "head *"
      severity: LOW
    - id: shell_allow_tail
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "tail *"
      severity: LOW
    - id: shell_allow_git_status
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "git status *"
      severity: LOW
    - id: shell_allow_git_log
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "git log *"
      severity: LOW
    - id: shell_allow_git_diff
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "git diff *"
      severity: LOW
    - id: shell_allow_git_branch
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "git branch *"
      severity: LOW
    - id: shell_ask_rm
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "rm *"
      severity: HIGH
    - id: shell_ask_del
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "del *"
      severity: HIGH
    - id: shell_ask_rd
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "rd *"
      severity: HIGH
    - id: shell_ask_mv
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "mv *"
      severity: HIGH
    - id: shell_ask_cp
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "cp *"
      severity: HIGH
    - id: shell_ask_chmod
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "chmod *"
      severity: HIGH
    - id: shell_ask_chown
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: "chown *"
      severity: HIGH
    - id: shell_ask_sensitive_file_reads
      tools: [bash, mcp_exec_command, create_terminal]
      pattern: 're:(?i)(^|[\s;&|()])((cat|type|less|more|head|tail|grep|find|Get-Content|Select-String)\b[^;&|]*(id_rsa|id_ed25519|\.pem\b|\.pfx\b|\.key\b|\.kube/config|\.aws/(credentials|config)|\.npmrc\b|\.env(\.[A-Za-z0-9_-]+)?\b|authorized_keys|\.ssh/))'
      severity: HIGH
    - id: path_ask_ssh
      tools: [read_file, write_file, edit_file, read_text_file, write_text_file, write, read, glob_file_search, glob, list_dir, list_files, grep, search_replace]
      pattern: "**/.ssh/**"
      severity: HIGH
    - id: path_ask_env
      tools: [read_file, write_file, edit_file, read_text_file, write_text_file, write, read, glob_file_search, glob, list_dir, list_files, grep, search_replace]
      pattern: "**/.env*"
      severity: HIGH

  # 数字分身 owner-scoped 权限（默认空，不生效）
  owner_scopes: {}
  deny_guidance_message: ""

  # 外部目录访问 (访问 workspace 外路径时的权限)
  external_directory:
    "*": "ask"

browser:
  # chrome_path can be a string or per-OS map.
  # Example:
  # chrome_path:
  #   windows: "C:\\Users\\YOUR_USER\\AppData\\Local\\Google\\Chrome\\Application\\chrome.exe"
  #   macos: "/Applications/Google Chrome.app"
  #   linux: "/usr/bin/google-chrome"
  remote_debugging_address: "127.0.0.1"
  remote_debugging_port: 9222
  # empty means use launcher default profile path by OS
  user_data_dir: ""
  profile_directory: "Default"

updater:
  enabled: true
  # 桌面端版本检查源类型：gitcode / github
  desktop_release_api_type: "gitcode"
  repo_owner: openJiuwen
  repo_name: jiuwenswarm 
  release_api_url: ""
  asset_name_pattern_windows: "JiuwenSwarm-setup-{version}.exe"
  asset_name_pattern_macos: "JiuwenSwarm-{version}.dmg"
  asset_name_pattern_linux: "JiuwenSwarm-{version}.tar.gz"
  sha256_name_pattern: "JiuwenSwarm-setup-{version}.exe.sha256"
  timeout_seconds: 20
  pypi_mirror: "https://mirrors.aliyun.com/pypi"

extensions:
  # 扩展包搜索目录（字符串），用 ';' 分割多个目录：
  # EXTENSION_DIRS="E:/a;D:/b"
  extension_dirs: ${EXTENSION_DIRS:-jiuwenswarm/extensions}


# ============================================================
# Hooks 配置
# 17 个事件类型，支持 command / prompt 两种 hook 类型
# 字段说明：
#   - disable_all_hooks: 全局关闭所有 hooks
#   - <事件名>:
#       - matcher: 匹配表达式（工具名|管道OR|正则|"*"）
#       - hooks:
#           - type: command | prompt
#           - command / prompt: 执行的命令或 prompt 模板
#             支持 $ARGUMENTS（hook input JSON）和 $TOOL_NAME 变量
#           - timeout: 超时秒数（默认 30s）
#           - shell: bash | sh | zsh（仅 command 类型）
#           - model: LLM 模型名（仅 prompt 类型，空则用默认轻量模型）
#           - status_message: 执行时显示的提示信息
# 退出码语义（command 类型）：
#   0 = 成功继续  2 = 阻止执行  其他 = 非阻塞错误
# ============================================================
hooks:
  disable_all_hooks: false

  # PreToolUse: 工具执行前拦截
  # PreToolUse:
  #   - matcher: "Write|Edit"
  #     hooks:
  #       - type: command
  #         command: "echo 'about to write file'"
  #         timeout: 30
  #         shell: "bash"
  #         status_message: "Running pre-write hook..."

  # PostToolUse: 工具执行后拦截
  # PostToolUse:
  #   - matcher: "Bash"
  #     hooks:
  #       - type: prompt
  #         prompt: "审查命令输出安全性: $ARGUMENTS"
  #         timeout: 15

  # SessionStart: 会话开始时
  # SessionStart:
  #   - matcher: "*"
  #     hooks:
  #       - type: command
  #         command: "echo 'session started'"

  # Stop: Agent 结束前
  # Stop:
  #   - matcher: "*"
  #     hooks:
  #       - type: command
  #         command: "echo 'agent stopping'"


team:
  # 默认：单机 local + inprocess。双机 pyzmq 示例见 tmp/team-leader.yaml、tmp/team-teammate.yaml（与 .tmp/leader_home、.tmp/teammate_home 内 config 同步）。
  runtime:
    mode: local
    role: leader

  team_name: jiuwen_team
  lifecycle: persistent
  teammate_mode: build_mode
  spawn_mode: inprocess

  leader:
    member_name: team_leader
    display_name: 团队领导
    persona: "天才项目管理专家，擅长任务分解和团队协调"

  agents:
    leader: $agent_leader
    teammate: $agent_teammate

  workspace:
    enabled: true

  transport:
    type: inprocess

  storage:
    type: sqlite

mcp:
  servers: []
  # 示例：
  # servers:
  #   - name: playwright
  #     enabled: true
  #     transport: stdio
  #     command: python
  #     args: ["path/to/server.py", "--transport", "stdio"]
  #     cwd: .
  #     env:
  #       LOG_LEVEL: INFO
  #   - name: local-sse
  #     enabled: false
  #     transport: sse
  #     url: http://127.0.0.1:9000/sse
  #     headers:
  #       Authorization: Bearer ${MCP_TOKEN}
  #     timeout_s: 30

modes:
  # 一级模式 agent / code / team
  agent:
    # agent 模式支持 性能/规划/集群
    fast:
      memory:
        enabled: true
        is_proactive: false
      rails:
      tools:
    plan:
      memory:
        enabled: true
        is_proactive: true
      rails:
      tools:
  code:
    # 记忆开关 — 控制 CodingMemoryRail 和 ProjectMemoryRail 加载
    # 关闭后，coding_memory_read/write/edit 工具不可用，项目记忆文件不自动加载
    memory:
      enabled: true

    # 动态 Rails — 列表中出现的 = 启用；不出现的 = 不启用
    # 固定 Rails（以下 Rails 已在代码中固定挂载，无需在此配置）：
    #   RuntimePromptRail, ResponsePromptRail, JiuSwarmStreamEventRail, SecurityRail,
    #   PermissionInterruptRail, SysOperationRail(FileSystemRail), LspRail,
    #   AgentModeRail, StructuredAskUserRail, ConfirmInterruptRail, ContextProcessorRail
    # 注意：ProjectMemoryRail, CodingMemoryRail 受 memory.enabled 开关控制，
    #       开关关闭时不加载，开关开启时固定挂载。
    rails:
      - SkillUseRail
      - WorktreeRail

    # 动态 Tools — 列表中出现的 = 启用
    # send_file_to_user 由运行时 _update_session_tools 注册，不在此配置
    # coding_memory_read/write/edit 由 CodingMemoryRail 在 subagent 内部注册，不在此配置
    tools:
      - web_free_search
      - web_fetch_webpage
      - web_paid_search
      - user_todos
      - skill_toolkit
      - skill_retrieval

    embedding_config:
      model_name: null
      base_url: null
      api_key: null
  team:
    jiuwen_team:
      team_name: jiuwen_team
      lifecycle: persistent
      teammate_mode: build_mode
      spawn_mode: inprocess
      enable_swarmflow: true

      # Team-specific permission control.
      enable_permissions: false

      leader:
        member_name: team-leader
        display_name: 团队领导
        persona: "天才项目管理专家，擅长任务分解和团队协调"

      agents:
        leader: $agent_leader

      workspace:
        enabled: true

      transport:
        type: inprocess

      storage:
        type: sqlite

      # ============================================================
      # Team 级共享记忆（TeamMemoryConfig）
      # ============================================================
      # 与常规 Agent 的 per-session 记忆不同，Team 记忆是一个独立的、
      # 跨成员的共享记忆系统，由 TeamMemoryManager 统一管理。
      #
      # 启用后，每个 Team 成员的记忆操作不再是孤立的个人记忆，
      # 而是读写同一份 TEAM_MEMORY.md（位于 team_memory_dir 下）。
      # 这允许成员之间通过记忆文件共享上下文（如项目背景、决策记录等）。
      # ============================================================
      memory:
        # ---------- 总开关 ----------
        # 关闭时 TeamMemoryManager 不创建，成员记忆回退到各自独立的 MemoryRail
        enabled: false

        # ---------- 场景标识 ----------
        # "general" — 通用场景，记忆提取 prompt 偏重项目背景与决策
        # "coding"  — 编码场景，记忆提取 prompt 偏重技术方案与架构决策
        scenario: "general"

        # ---------- 自动提取 ----------
        # true  — 每轮对话结束后，后台自动总结并写入 TEAM_MEMORY.md
        # false — 仅当 LLM 主动调用记忆工具时才写入
        # 仅在 lifecycle=persistent 时生效；temporary 团队不触发自动提取
        auto_extract: true

        # ---------- 共享记忆 ----------
        # true  — 所有成员共享同一份 TEAM_MEMORY.md（默认）
        # false — 每个成员维护独立记忆文件（按 member_name 分目录）
        shared_memory: true

        # ---------- 记忆注入模式 ----------
        # 控制记忆内容如何注入到每个成员的 system prompt 中：
        #   "proactive" — 每轮对话开始时主动注入最新记忆摘要
        member_memory_prompt_mode: "proactive"
